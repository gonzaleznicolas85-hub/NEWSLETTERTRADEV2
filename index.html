<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Dashboard</title>
    <style>
        /* --- VARIABLES DE DISEÑO --- */
        :root {
            --blue-main: #007BFF;
            --dark-bg: #222222;
            --white: #ffffff;
            --bg-page: #f4f6f9; /* Un gris un poco más moderno para fondo de PC */
        }

        /* --- RESET Y FONDO --- */
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2vw; /* Espacio dinámico alrededor */
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* --- CONTENEDOR PRINCIPAL (ESTILO PC) --- */
        .container {
            width: 100%;
            max-width: 1400px; /* Súper ancho para abarcar pantallas de PC grandes */
            background-color: var(--white);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 12px; /* Bordes redondeados modernos */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- CABECERA --- */
        .header {
            background-color: var(--blue-main);
            color: white;
            padding: 40px 50px;
            text-align: left;
            border-bottom: 5px solid var(--dark-bg);
        }

        .header h1 { 
            margin: 0; 
            font-size: clamp(35px, 5vw, 60px); 
            letter-spacing: -1px; 
            text-transform: uppercase;
            line-height: 1;
        }
        
        .header h2 { 
            margin: 10px 0 0 0; 
            font-size: clamp(20px, 3vw, 35px); 
            font-weight: normal; 
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
        }

        /* --- SISTEMA DE GRILLA (La magia para PC vs Móvil) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr; /* Por defecto (Móvil): 1 sola columna */
            gap: 40px;
            padding: 40px 50px;
            background-color: var(--white);
        }

        /* Cuando la pantalla es mayor a 900px (PC/Tablets grandes), usa 2 columnas */
        @media (min-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* --- SEPARADORES DE COLUMNA --- */
        .divider-dots {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* --- PÍLDORAS DE DATOS --- */
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: #ffffff;
            border-radius: 50px;
            border: 2px solid #eaeaea;
            padding: 5px 20px 5px 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .item-row:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .icon-circle {
            background-color: #333;
            color: white;
            min-width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
        }

        .label-pill {
            padding: 12px 20px;
            color: white;
            border-radius: 30px;
            text-transform: uppercase;
            font-size: clamp(12px, 1.5vw, 15px);
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
        }

        .value-text {
            padding-left: 20px;
            font-size: clamp(14px, 1.8vw, 18px);
            color: #111;
            font-weight: bold;
            white-space: nowrap;
        }

        /* --- CUADROS DE TEXTO --- */
        .info-box {
            border: 3px solid;
            margin-top: 25px;
            padding: 25px;
            border-radius: 12px;
            background-color: #fafafa;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }

        .info-box h4 { 
            margin: 0; 
            text-transform: uppercase; 
            font-size: clamp(16px, 2vw, 20px);
        }
        
        .info-box p { 
            margin: 12px 0 0 0; 
            font-size: clamp(13px, 1.5vw, 16px);
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold; 
            line-height: 1.6; 
            color: #444;
        }

        /* --- ADAPTABILIDAD PARA MÓVILES --- */
        @media (max-width: 600px) {
            body { padding: 0; background-color: var(--white); }
            .container { border-radius: 0; box-shadow: none; }
            .header { padding: 30px 20px; }
            .content-grid { padding: 20px 15px; gap: 30px; }
            .item-row { padding: 4px 10px 4px 4px; border-radius: 40px; }
            .icon-circle { min-width: 35px; height: 35px; font-size: 16px; margin-right: 8px; }
            .label-pill { padding: 10px 15px; font-size: 11px; }
            .value-text { font-size: 12px; padding-left: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="main-title">CONECTANDO...</h1>
        <h2 id="sub-title">Buscando datos</h2>
    </div>

    <div class="content-grid">
        <div class="column">
            <div class="divider-dots">✦ PROGRAMA DE MERCADO ✦</div>
            <div id="content-programa">
                </div>
        </div>

        <div class="column">
            <div class="divider-dots">⚽ LIGA DE EJECUCIÓN ⚽</div>
            <div id="content-liga">
                </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ PEGA AQUÍ LA NUEVA URL (La que generaste en el Paso 1)
    const WEB_APP_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI';

    async function init() {
        try {
            const res = await fetch(WEB_APP_URL);
            
            // Verificamos si la respuesta de red es correcta
            if (!res.ok) {
                throw new Error("Error en la red. Código: " + res.status);
            }

            const data = await res.json();

            // Títulos
            document.getElementById('main-title').innerText = data.config.TITULO_PRINCIPAL || "RESUMEN";
            document.getElementById('sub-title').innerText = data.config.SUBTITULO_FECHA || "";

            // Colores
            if(data.config.COLOR_BORDE_Y_HEADER) {
                document.documentElement.style.setProperty('--blue-main', data.config.COLOR_BORDE_Y_HEADER);
            }
            if(data.config.COLOR_BARRAS_SEPARADORAS) {
                document.documentElement.style.setProperty('--dark-bg', data.config.COLOR_BARRAS_SEPARADORAS);
            }
            if(data.config.COLOR_FONDO_PAGINA) {
                document.documentElement.style.setProperty('--bg-page', data.config.COLOR_FONDO_PAGINA);
            }

            // Contenedores
            const programaDiv = document.getElementById('content-programa');
            const ligaDiv = document.getElementById('content-liga');
            programaDiv.innerHTML = "";
            ligaDiv.innerHTML = "";

            // Llenado
            data.content.forEach(item => {
                let container = (item.seccion === 'PROGRAMA DE MERCADO') ? programaDiv : ligaDiv;
                
                if (!item.valor.includes('%') || item.valor.length > 40) {
                    container.innerHTML += `
                        <div class="info-box" style="border-color: ${item.color}">
                            <h4 style="color: ${item.color}">${item.etiqueta}</h4>
                            <p>${item.valor}</p>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div class="item-row">
                            <div class="icon-circle">➔</div>
                            <div class="label-pill" style="background-color: ${item.color}">${item.etiqueta}</div>
                            <div class="value-text">${item.valor}</div>
                        </div>`;
                }
            });

        } catch (err) {
            console.error("Detalle del error:", err);
            document.getElementById('main-title').innerText = "ERROR DE CONEXIÓN";
            document.getElementById('sub-title').innerText = "Verifica la URL en el código o publica una nueva versión en Apps Script.";
        }
    }

    init();
</script>
</body>
</html>
